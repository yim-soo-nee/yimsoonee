<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ยิ้มสู้หนี้ · ห้องเรียนออนไลน์</title>
  <meta name="description" content="ห้องเรียนออนไลน์ทักษะการบริหารจัดการหนี้ โดยโครงการยิ้มสู้หนี้">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0d1f91;
      font-family: 'IBM Plex Sans Thai', sans-serif;
    }

    /* iframe เต็มหน้าจอ */
    #app-frame {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      background: #f1f5f9;
    }

    /* Loading screen แสดงระหว่าง iframe load */
    #loading {
      position: fixed;
      inset: 0;
      background: #0d1f91;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 100;
      transition: opacity .4s ease;
    }
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #loading img {
      width: 90px; height: 90px;
      object-fit: contain;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,.3));
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.06); }
    }
    #loading .title {
      font-size: 20px; font-weight: 700;
      color: #fff; letter-spacing: .02em;
    }
    #loading .sub {
      font-size: 13px;
      color: rgba(255,255,255,.55);
    }
    #loading .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-top: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Loading Screen -->
<div id="loading">
  <img src="https://lh3.googleusercontent.com/d/1rCJPNfrf96621kkleh7rYAj4VnSg1r48"
       alt="ยิ้มสู้หนี้" onerror="this.style.display='none'">
  <div class="title">ยิ้มสู้หนี้</div>
  <div class="sub">ห้องเรียนออนไลน์ · ทักษะการบริหารจัดการหนี้</div>
  <div class="spinner"></div>
</div>

<!-- GAS App Frame -->
<iframe
  id="app-frame"
  src="about:blank"
  allow="fullscreen"
  sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-modals allow-top-navigation-by-user-activation"
></iframe>

<script>
// ============================================================
//  CONFIG
// ============================================================
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxe9vb-OWt83joNkDI9ERMQL21xJnvwVFz2rOeC1LCEywvVXFfepxeoLHbH5OGRqMkylg/exec';

// ============================================================
//  STATE
// ============================================================
var _token = '';
var _ready = false;
var frame  = document.getElementById('app-frame');
var loading = document.getElementById('loading');

// ============================================================
//  INIT
// ============================================================
frame.src = GAS_URL + '?page=index';

frame.addEventListener('load', function() {
  if (!_ready) {
    _ready = true;
    loading.classList.add('hidden');
    setTimeout(function() { loading.style.display = 'none'; }, 450);
  } else {
    // ซ่อน loading เมื่อ navigate สำเร็จ
    loading.classList.add('hidden');
    setTimeout(function() { loading.style.display = 'none'; }, 450);
  }
});

// ============================================================
//  navigateFrame — เปลี่ยน iframe.src + แสดง loading
// ============================================================
function navigateFrame(page, token, params) {
  params = params || {};
  var url = GAS_URL + '?page=' + encodeURIComponent(page);
  if (token) url += '&t=' + encodeURIComponent(token);
  if (params.idx  !== undefined) url += '&idx='  + params.idx;
  if (params.type !== undefined) url += '&type=' + encodeURIComponent(params.type);
  if (params.open !== undefined && params.open >= 0) url += '&open=' + params.open;

  // แสดง loading
  loading.style.display = 'flex';
  loading.classList.remove('hidden');

  frame.src = url;
}

// ============================================================
//  postMessage HANDLER — รับจาก GAS iframe
//
//  cross-origin note:
//  GAS iframe origin = https://n-xxx.googleusercontent.com
//  GitHub Pages origin = https://yim-soo-nee.github.io
//  postMessage ทำงานได้แม้ cross-origin ถ้า targetOrigin = '*'
//  แต่ GAS sandbox อาจ block window.parent.postMessage
//  → ใช้ URL hash/fragment แทนเป็น fallback
// ============================================================
window.addEventListener('message', function(event) {
  var data = event.data;
  if (!data || typeof data !== 'object') return;

  if (data.type === 'SET_TOKEN') {
    _token = data.token || '';
    navigateFrame('dashboard', _token, {});
  }

  if (data.type === 'NAVIGATE') {
    if (data.token) _token = data.token;
    navigateFrame(data.page || 'index', _token, data.params || {});
  }

  if (data.type === 'LOGOUT') {
    _token = '';
    navigateFrame('index', '', {});
  }
});

// ============================================================
//  URL HASH FALLBACK
//  GAS pages อาจใช้ window.location.hash แทน postMessage
//  เมื่อ sandbox block postMessage
//  format: #nav:page:token:params_json
// ============================================================
function checkHash() {
  var hash = window.location.hash;
  if (!hash || hash.length < 5) return;

  try {
    var raw  = hash.substring(1); // ลบ #
    var data = JSON.parse(decodeURIComponent(raw));

    if (data.type === 'SET_TOKEN') {
      _token = data.token || '';
      window.location.hash = '';
      navigateFrame('dashboard', _token, {});
    } else if (data.type === 'NAVIGATE') {
      if (data.token) _token = data.token;
      window.location.hash = '';
      navigateFrame(data.page || 'index', _token, data.params || {});
    } else if (data.type === 'LOGOUT') {
      _token = '';
      window.location.hash = '';
      navigateFrame('index', '', {});
    }
  } catch(e) {}
}

window.addEventListener('hashchange', checkHash);
checkHash();
</script>

</body>
</html>
