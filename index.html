<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ยิ้มสู้หนี้ · ห้องเรียนออนไลน์</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; }

    /* ===== Loading Screen ===== */
    #loading {
      position:fixed; inset:0; z-index:100;
      background:#0d1f91;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:16px;
      font-family:'IBM Plex Sans Thai', 'Noto Sans Thai', sans-serif;
      transition:opacity .4s ease;
    }
    #loading.hide { opacity:0; pointer-events:none; }
    #loading img { width:80px; height:80px; object-fit:contain; }
    #loading .title { font-size:18px; font-weight:700; color:#fff; }
    #loading .sub   { font-size:13px; color:rgba(255,255,255,.6); }
    #loading .spinner {
      width:30px; height:30px;
      border:3px solid rgba(255,255,255,.2);
      border-top-color:#fff;
      border-radius:50%;
      animation:spin .8s linear infinite;
    }
    #loading .msg { font-size:13px; color:rgba(255,255,255,.8); }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ===== Error Screen ===== */
    #error-screen {
      position:fixed; inset:0;
      background:#f1f5f9;
      display:none; flex-direction:column;
      align-items:center; justify-content:center; gap:16px;
      font-family:'IBM Plex Sans Thai', 'Noto Sans Thai', sans-serif;
      padding:32px; text-align:center;
    }
    #error-screen .err-icon { font-size:48px; }
    #error-screen h2 { font-size:18px; color:#0d1f91; font-weight:700; }
    #error-screen p  { font-size:13px; color:#64748b; line-height:1.6; }
    #error-screen button {
      padding:12px 28px; background:#0d1f91; color:#fff;
      border:none; border-radius:10px; font-size:14px;
      font-weight:600; cursor:pointer; font-family:inherit;
    }

    /* ===== App iframe ===== */
    #app-frame {
      position:fixed; top:0; left:0;
      width:100%; height:100%;
      border:none;
      display:none;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Loading Screen -->
<div id="loading">
  <img src="https://lh3.googleusercontent.com/d/1rCJPNfrf96621kkleh7rYAj4VnSg1r48"
       alt="ยิ้มสู้หนี้" onerror="this.style.display='none'">
  <div class="title">ยิ้มสู้หนี้</div>
  <div class="sub">ห้องเรียนออนไลน์ · ทักษะการบริหารจัดการหนี้</div>
  <div class="spinner"></div>
  <div class="msg" id="loading-msg">กำลังเชื่อมต่อ LINE...</div>
</div>

<!-- Error Screen -->
<div id="error-screen">
  <div class="err-icon">⚠️</div>
  <h2>เกิดข้อผิดพลาด</h2>
  <p id="error-msg">ไม่สามารถเชื่อมต่อระบบได้<br>กรุณาลองใหม่อีกครั้ง</p>
  <button onclick="location.reload()">ลองใหม่</button>
</div>

<!-- GAS App iframe (แสดงหลัง login สำเร็จ) -->
<iframe id="app-frame" allow="fullscreen"></iframe>

<script>
// ============================================================
//  CONFIG — แก้ค่าเหล่านี้เท่านั้น
// ============================================================
var LIFF_ID = '2006491477-lMQxonNr';
var GAS_URL = 'https://script.google.com/macros/s/AKfycbyv2nRwrrDjVGnMqqfLhI_HD3VzRpNyy2EggcFxNnunUkDr0jNIxEkMdKoMvFdMm77zSA/exec';

// ============================================================
//  UTILS
// ============================================================
function setMsg(msg) {
  var el = document.getElementById('loading-msg');
  if (el) el.textContent = msg;
}

function showError(msg) {
  document.getElementById('loading').classList.add('hide');
  var err = document.getElementById('error-screen');
  err.style.display = 'flex';
  document.getElementById('error-msg').textContent = msg || 'เกิดข้อผิดพลาด กรุณาลองใหม่';
}

function launchApp(token) {
  // โหลด GAS พร้อม token ใน iframe
  var url = GAS_URL + (token ? '?liff_token=' + encodeURIComponent(token) : '');
  var frame = document.getElementById('app-frame');
  frame.src = url;
  frame.style.display = 'block';

  // ซ่อน loading หลัง iframe โหลด
  frame.onload = function() {
    var loading = document.getElementById('loading');
    loading.classList.add('hide');
    setTimeout(function() { loading.style.display = 'none'; }, 450);
  };
}

// ============================================================
//  CALL GAS — loginWithLine
// ============================================================
function callGasLoginWithLine(lineUserId, lineDisplayName) {
  setMsg('กำลังเข้าสู่ระบบ...');

  var url = GAS_URL
    + '?action=liff_login'
    + '&lineUserId='      + encodeURIComponent(lineUserId)
    + '&lineDisplayName=' + encodeURIComponent(lineDisplayName || '');

  fetch(url)
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data && data.ok && data.token) {
        setMsg('เข้าสู่ระบบสำเร็จ!');
        launchApp(data.token);
      } else {
        showError((data && data.message) || 'เข้าสู่ระบบไม่สำเร็จ');
      }
    })
    .catch(function(err) {
      console.error('GAS call failed:', err);
      showError('ไม่สามารถเชื่อมต่อระบบได้');
    });
}

// ============================================================
//  LIFF INIT
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
  setMsg('กำลังเชื่อมต่อ LINE...');

  liff.init({ liffId: LIFF_ID })
    .then(function() {

      // ยังไม่ได้ login LINE → redirect ไป LINE login
      if (!liff.isLoggedIn()) {
        setMsg('กำลังพาไปยัง LINE Login...');
        liff.login();
        return;
      }

      // login แล้ว → ดึง profile
      setMsg('กำลังดึงข้อมูล LINE...');
      return liff.getProfile();
    })
    .then(function(profile) {
      if (!profile) return; // กรณี liff.login() redirect ออกไปแล้ว
      console.log('[LIFF] Profile:', profile.userId.substring(0,8) + '...');
      setMsg('ยืนยันตัวตนสำเร็จ...');
      callGasLoginWithLine(profile.userId, profile.displayName);
    })
    .catch(function(err) {
      console.error('[LIFF] Error:', err);
      showError('LINE Login ล้มเหลว: ' + (err.message || 'กรุณาลองใหม่'));
    });
});
</script>

</body>
</html>
