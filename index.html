<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ยิ้มสู้หนี้ · ห้องเรียนออนไลน์</title>
  <meta name="description" content="ห้องเรียนออนไลน์ทักษะการบริหารจัดการหนี้ โดยโครงการยิ้มสู้หนี้">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0d1f91;
      font-family: 'IBM Plex Sans Thai', sans-serif;
    }

    /* iframe เต็มหน้าจอ */
    #app-frame {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      background: #f1f5f9;
    }

    /* Loading screen แสดงระหว่าง iframe load */
    #loading {
      position: fixed;
      inset: 0;
      background: #0d1f91;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 100;
      transition: opacity .4s ease;
    }
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #loading img {
      width: 90px; height: 90px;
      object-fit: contain;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,.3));
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.06); }
    }
    #loading .title {
      font-size: 20px; font-weight: 700;
      color: #fff; letter-spacing: .02em;
    }
    #loading .sub {
      font-size: 13px;
      color: rgba(255,255,255,.55);
    }
    #loading .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-top: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Loading Screen -->
<div id="loading">
  <img src="https://lh3.googleusercontent.com/d/1rCJPNfrf96621kkleh7rYAj4VnSg1r48"
       alt="ยิ้มสู้หนี้" onerror="this.style.display='none'">
  <div class="title">ยิ้มสู้หนี้</div>
  <div class="sub">ห้องเรียนออนไลน์ · ทักษะการบริหารจัดการหนี้</div>
  <div class="spinner"></div>
</div>

<!-- GAS App Frame -->
<iframe
  id="app-frame"
  src="about:blank"
  allow="fullscreen"
  sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-modals allow-top-navigation-by-user-activation"
></iframe>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxe9vb-OWt83joNkDI9ERMQL21xJnvwVFz2rOeC1LCEywvVXFfepxeoLHbH5OGRqMkylg/exec';

var _token  = '';
var frame   = document.getElementById('app-frame');
var loading = document.getElementById('loading');

// Build GAS URL with token and params
function buildUrl(page, token, params) {
  var url = GAS_URL + '?page=' + encodeURIComponent(page || 'index');
  if (token) url += '&t=' + encodeURIComponent(token);
  if (params) {
    if (params.idx  != null) url += '&idx='  + params.idx;
    if (params.type != null) url += '&type=' + encodeURIComponent(params.type);
    if (params.open != null && params.open >= 0) url += '&open=' + params.open;
  }
  return url;
}

// Change iframe src
function loadPage(page, token, params) {
  loading.style.display = 'flex';
  loading.classList.remove('hidden');
  _token = token || _token;
  frame.src = buildUrl(page, _token, params);
}

// INIT
frame.src = buildUrl('index', '', {});

// Hide loading when iframe finishes loading
frame.addEventListener('load', function() {
  loading.classList.add('hidden');
  setTimeout(function() { loading.style.display = 'none'; }, 400);

  // After each load, check if URL changed to GAS direct URL
  // and intercept links inside iframe
  setTimeout(interceptLinks, 300);
});

// Intercept <a> clicks inside iframe
function interceptLinks() {
  try {
    var doc = frame.contentDocument;
    if (!doc) return;
    // Remove old listener if any
    doc.removeEventListener('click', handleIframeClick, true);
    doc.addEventListener('click', handleIframeClick, true);
  } catch(e) {
    // cross-origin blocked - can't access contentDocument
    // fall back to URL polling
  }
}

function handleIframeClick(e) {
  // Walk up to find <a> tag
  var el = e.target;
  while (el && el.tagName !== 'A') el = el.parentNode;
  if (!el || !el.href) return;

  var href = el.href;
  // Only intercept GAS URLs
  if (href.indexOf('script.google.com') === -1) return;

  e.preventDefault();
  e.stopPropagation();

  try {
    var u    = new URL(href);
    var page = u.searchParams.get('page') || 'index';
    var tok  = u.searchParams.get('t')    || _token;
    if (tok) _token = tok;
    loadPage(page, _token, {
      idx:  u.searchParams.get('idx'),
      type: u.searchParams.get('type'),
      open: u.searchParams.get('open')
    });
  } catch(ex) {}
}

// postMessage handler (backup - in case GAS can send postMessage)
window.addEventListener('message', function(ev) {
  // Accept from any Google origin
  if (ev.origin && ev.origin.indexOf('google') === -1 &&
      ev.origin !== window.location.origin) return;

  var d = ev.data;
  if (!d || typeof d !== 'object') return;

  if (d.type === 'SET_TOKEN') { _token = d.token || ''; loadPage('dashboard', _token, {}); }
  if (d.type === 'NAVIGATE')  { if (d.token) _token = d.token; loadPage(d.page||'index', _token, d.params||{}); }
  if (d.type === 'LOGOUT')    { _token = ''; loadPage('index', '', {}); }
});

// Polling: detect if iframe navigated to GAS URL directly
// (happens when sandbox allows top navigation)
var _pollCount = 0;
setInterval(function() {
  _pollCount++;
  try {
    var src = frame.contentWindow.location.href;
    // If iframe is at a GAS URL with page parameter, re-wrap it
    if (src && src.indexOf('script.google.com/macros') !== -1) {
      var u    = new URL(src);
      var page = u.searchParams.get('page') || 'index';
      var tok  = u.searchParams.get('t')    || _token;
      if (tok) _token = tok;
      loadPage(page, _token, {
        idx:  u.searchParams.get('idx'),
        type: u.searchParams.get('type'),
        open: u.searchParams.get('open')
      });
    }
  } catch(e) {
    // Cross-origin - cannot read href, this is expected
  }
}, 500);
</script>





</body>
</html>
